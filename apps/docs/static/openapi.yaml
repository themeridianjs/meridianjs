  /public/share/{token}/issues:
    get:
      tags: [Public]
      summary: List issues on a shared project
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issues list

  /public/share/{token}/sprints:
    get:
      tags: [Public]
      summary: List sprints on a shared project
      security: []
      parameters:
        - in: path
