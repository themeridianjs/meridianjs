      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  /admin/projects/{id}/teams:
    post:
      tags: [Project Members]
      summary: Grant a team access to a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [team_id]
              properties:
                team_id:
                  type: string
      responses:
        "201":
          description: Team access granted

  /admin/projects/{id}/teams/{teamId}:
    delete:
      tags: [Project Members]
      summary: Remove a team's access from a project
      parameters:
        - in: path
          name: id
          required: true
          schema:
