openapi: 3.0.3
info:
  title: MeridianJS API
  description: |
    REST API for MeridianJS — an open-source modular project management framework.

    ## Authentication
    All `/admin/*` endpoints require a valid JWT passed as a Bearer token:
    ```
    Authorization: Bearer <token>
    ```
    Obtain a token via `POST /auth/login`. The `/auth/*` and `/public/*` endpoints are unauthenticated.

    ## Roles
    The JWT payload carries a `roles` array. Built-in roles:
    - `super-admin` — full access to all workspaces and data
    - `admin` — full access within their workspace
    - `member` — filtered by workspace and project membership

    Custom fine-grained permissions are managed via the AppRole module.
  version: 1.0.0
  contact:
    name: MeridianJS
    url: https://github.com/themeridianjs/meridianjs

servers:
  - url: http://localhost:9000
    description: Local development server

tags:
  - name: Auth
    description: Register, login, logout, and Google OAuth
  - name: Users
    description: User management and profile
  - name: Workspaces
    description: Workspace management
  - name: Workspace Members
    description: Add, list, update, and remove workspace members
  - name: Teams
    description: Team management within a workspace
  - name: Projects
    description: Project management
  - name: Project Members
    description: Project-level access control
  - name: Project Statuses
    description: Custom Kanban statuses per project
  - name: Issues
    description: Issue tracking
  - name: Comments
    description: Issue comments with @mention support
  - name: Sprints
    description: Sprint / cycle management
  - name: Notifications
    description: In-app notifications
  - name: Roles
    description: Custom AppRole management with fine-grained permissions
  - name: Org Calendar
    description: Organisation-wide working calendar and holidays
  - name: Public
    description: Unauthenticated public share endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        designation:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        plan:
          type: string
          enum: [free, pro, enterprise]
        logo_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        identifier:
          type: string
          description: Short uppercase code used as issue prefix (e.g. "MER")
        description:
          type: string
          nullable: true
        workspace_id:
          type: string
        status:
          type: string
          enum: [active, archived]
        visibility:
          type: string
          enum: [private, public]
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        owner_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    ProjectStatus:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        key:
          type: string
        color:
          type: string
        category:
          type: string
          enum: [backlog, unstarted, started, completed, cancelled]
        position:
          type: integer

    Issue:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
          description: Auto-generated identifier (e.g. "MER-42")
        number:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          description: Matches one of the project's custom status keys
        type:
          type: string
          enum: [feature, bug, task, story, epic, improvement, question]
        priority:
          type: string
          enum: [urgent, high, medium, low, none]
        project_id:
          type: string
        workspace_id:
          type: string
        assignee_ids:
          type: array
          items:
            type: string
        reporter_id:
          type: string
          nullable: true
        sprint_id:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true
        start_date:
          type: string
          format: date-time
          nullable: true
        due_date:
          type: string
          format: date-time
          nullable: true
        estimate:
          type: number
          nullable: true
        created_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        author_id:
          type: string
        body:
          type: string
          description: HTML string. Mention chips use <span data-type="mention" data-id="user_id">.
        metadata:
          type: object
          nullable: true
          properties:
            mentioned_user_ids:
              type: array
              items:
                type: string
        created_at:
          type: string
          format: date-time

    Sprint:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        goal:
          type: string
          nullable: true
        project_id:
          type: string
        status:
          type: string
          enum: [planned, active, completed]
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        title:
          type: string
        body:
          type: string
          nullable: true
        type:
          type: string
        is_read:
          type: boolean
        data:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    WorkspaceMember:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum: [admin, member]
        user:
          $ref: "#/components/schemas/User"

    Team:
      type: object
      properties:
        id:
          type: string
        workspace_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        member_count:
          type: integer

    AppRole:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        permissions:
          type: array
          items:
            type: string
        is_system:
          type: boolean

    OrgCalendar:
      type: object
      properties:
        id:
          type: string
        work_days:
          type: array
          items:
            type: integer
            description: 0=Sunday, 1=Monday … 6=Saturday
        timezone:
          type: string

    OrgHoliday:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        date:
          type: string
          format: date
        recurring:
          type: boolean

security:
  - bearerAuth: []

paths:

  # ─── Auth ─────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register the first user
      description: |
        Creates the initial super-admin account. **Only works when no users exist yet.**
        Subsequent accounts must be created via an invitation link.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                first_name:
                  type: string
                last_name:
                  type: string
            example:
              email: admin@example.com
              password: supersecret123
              first_name: Alice
              last_name: Admin
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "400":
          description: Validation error
        "403":
          description: Registration is closed (users already exist)

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and get a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: admin@example.com
              password: supersecret123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "400":
          description: Validation error
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current session
      responses:
        "200":
          description: Logged out

  /auth/setup:
    get:
      tags: [Auth]
      summary: Check if initial setup is required
      description: Returns whether the system has any users yet.
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup:
                    type: boolean

  /auth/invite/{token}:
    get:
      tags: [Auth]
      summary: Validate an invitation token
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite details
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite:
                    type: object
                    properties:
                      email:
                        type: string
                      workspace_id:
                        type: string
                      role:
                        type: string
        "404":
          description: Token not found or expired
    post:
      tags: [Auth]
      summary: Accept an invitation (register or login)
      description: |
        If the invited email already has an account, this logs them in and adds them to the workspace.
        If not, a new account is created.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        "200":
          description: Accepted — user logged in and added to workspace
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string

  # ─── Users ────────────────────────────────────────────────────────────────

  /admin/users:
    get:
      tags: [Users]
      summary: List all users
      description: Requires `admin` or `super-admin` role.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  count:
                    type: integer

  /admin/users/me:
    get:
      tags: [Users]
      summary: Get the current user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
    put:
      tags: [Users]
      summary: Update the current user's profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                designation:
                  type: string
                phone_number:
                  type: string
            example:
              first_name: Alice
              last_name: Smith
              designation: Engineering Lead
      responses:
        "200":
          description: Updated user

  /admin/users/me/avatar:
    post:
      tags: [Users]
      summary: Upload a profile avatar
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string

  /admin/users/invite:
    post:
      tags: [Users]
      summary: Invite a user to a workspace by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, workspace_id]
              properties:
                email:
                  type: string
                  format: email
                workspace_id:
                  type: string
                role:
                  type: string
                  default: member
            example:
              email: bob@example.com
              workspace_id: ws_123
              role: member
      responses:
        "201":
          description: Invitation created and email sent

  /admin/users/{id}:
    get:
      tags: [Users]
      summary: Get a user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
    put:
      tags: [Users]
      summary: Update a user (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                is_active:
                  type: boolean
      responses:
        "200":
          description: Updated user

  /admin/users/{id}/role:
    put:
      tags: [Users]
      summary: Assign an AppRole to a user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_role_id]
              properties:
                app_role_id:
                  type: string
      responses:
        "200":
          description: Role assigned

  # ─── Workspaces ───────────────────────────────────────────────────────────

  /admin/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      description: |
        Admins see all workspaces. Members see only workspaces they belong to.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/Workspace"
                  count:
                    type: integer
    post:
      tags: [Workspaces]
      summary: Create a workspace
      description: Requires `workspace:create` permission. The creator is automatically added as an admin member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                plan:
                  type: string
                  default: free
            example:
              name: Acme Corp
              plan: free
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"

  /admin/workspaces/{id}:
    get:
      tags: [Workspaces]
      summary: Get a workspace by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace object
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspace:
                    $ref: "#/components/schemas/Workspace"
    put:
      tags: [Workspaces]
      summary: Update a workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                plan:
                  type: string
      responses:
        "200":
          description: Updated workspace
    delete:
      tags: [Workspaces]
      summary: Delete a workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/workspaces/{id}/logo:
    post:
      tags: [Workspaces]
      summary: Upload a workspace logo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                logo:
                  type: string
                  format: binary
      responses:
        "200":
          description: Logo uploaded

  # ─── Workspace Members ────────────────────────────────────────────────────

  /admin/workspaces/{id}/members:
    get:
      tags: [Workspace Members]
      summary: List workspace members
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMember"
                  count:
                    type: integer
    post:
      tags: [Workspace Members]
      summary: Add a user to a workspace
      description: Requires `member:invite` permission.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                role:
                  type: string
                  enum: [admin, member]
                  default: member
                app_role_id:
                  type: string
                  description: Optional custom AppRole to assign to the user
      responses:
        "201":
          description: Member added
        "409":
          description: User already a member

  /admin/workspaces/{id}/members/{userId}:
    patch:
      tags: [Workspace Members]
      summary: Update a member's role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, member]
      responses:
        "200":
          description: Role updated
    delete:
      tags: [Workspace Members]
      summary: Remove a member from a workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  /admin/workspaces/{id}/invitations:
    get:
      tags: [Workspace Members]
      summary: List pending invitations for a workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of invitations
    post:
      tags: [Workspace Members]
      summary: Create a workspace invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  default: member
      responses:
        "201":
          description: Invitation created

  /admin/workspaces/{id}/invitations/{inviteId}:
    delete:
      tags: [Workspace Members]
      summary: Revoke a pending invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: inviteId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Invitation revoked

  # ─── Teams ────────────────────────────────────────────────────────────────

  /admin/workspaces/{id}/teams:
    get:
      tags: [Teams]
      summary: List teams in a workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"
                  count:
                    type: integer
    post:
      tags: [Teams]
      summary: Create a team
      description: Requires `team:create` permission.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
            example:
              name: Frontend Team
              description: Handles all UI work
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                type: object
                properties:
                  team:
                    $ref: "#/components/schemas/Team"

  /admin/workspaces/{id}/teams/{teamId}:
    get:
      tags: [Teams]
      summary: Get a team by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team object
    put:
      tags: [Teams]
      summary: Update a team
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
      responses:
        "200":
          description: Updated team
    delete:
      tags: [Teams]
      summary: Delete a team
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/workspaces/{id}/teams/{teamId}/members:
    get:
      tags: [Teams]
      summary: List team members
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team members
    post:
      tags: [Teams]
      summary: Add a user to a team
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
