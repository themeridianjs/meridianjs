          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
                category:
                  type: string
      responses:
        "200":
          description: Updated status
    delete:
      tags: [Project Statuses]
      summary: Delete a status
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: statusId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/projects/{id}/statuses/reorder:
    post:
      tags: [Project Statuses]
      summary: Reorder statuses
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordered_ids]
              properties:
                ordered_ids:
                  type: array
                  items:
                    type: string
                  description: Full list of status IDs in the desired order
      responses:
        "200":
          description: Reordered

  # ─── Issues ───────────────────────────────────────────────────────────────

  /admin/issues:
    get:
      tags: [Issues]
      summary: List issues
      parameters:
        - in: query
          name: project_id
          schema:
            type: string
          description: Filter by project (recommended — enforces project access check)
        - in: query
          name: status
          schema:
            type: string
          description: Single status key or comma-separated list (e.g. `todo,in_progress`)
        - in: query
          name: type
          schema:
            type: string
          description: Single type or comma-separated list
        - in: query
          name: priority
          schema:
            type: string
          description: Single priority or comma-separated list
        - in: query
          name: sprint_id
          schema:
            type: string
          description: Filter by sprint. Pass `none` to get issues with no sprint.
        - in: query
          name: assignee_id
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: "#/components/schemas/Issue"
                  count:
                    type: integer
    post:
      tags: [Issues]
      summary: Create an issue
      description: Requires `issue:create` permission. Runs through the `createIssueWorkflow` (DAG with compensation).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, project_id, workspace_id]
              properties:
                title:
                  type: string
                project_id:
                  type: string
                workspace_id:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [feature, bug, task, story, epic, improvement, question]
                  default: task
                priority:
                  type: string
                  enum: [urgent, high, medium, low, none]
                  default: none
                status:
                  type: string
                  description: Must match one of the project's custom status keys
                assignee_ids:
                  type: array
                  items:
                    type: string
                sprint_id:
                  type: string
                parent_id:
                  type: string
                start_date:
                  type: string
                  format: date-time
                due_date:
                  type: string
                  format: date-time
                estimate:
                  type: number
                  description: Story point estimate
            example:
              title: Fix login crash on iOS 17
              project_id: proj_abc
              workspace_id: ws_abc
              type: bug
              priority: urgent
              status: todo
      responses:
        "201":
          description: Issue created
          content:
            application/json:
              schema:
                type: object
                properties:
                  issue:
                    $ref: "#/components/schemas/Issue"

  /admin/issues/{id}:
    get:
      tags: [Issues]
      summary: Get an issue by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue object
          content:
            application/json:
              schema:
                type: object
                properties:
                  issue:
                    $ref: "#/components/schemas/Issue"
    put:
      tags: [Issues]
      summary: Update an issue
      description: |
        Requires `issue:update` permission.

        Updating `status` triggers the `updateIssueStatusWorkflow`.
        Updating `assignee_ids` triggers the `assignIssueWorkflow`.
        Both run with saga compensation on failure.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                priority:
                  type: string
                type:
                  type: string
                assignee_ids:
                  type: array
                  items:
                    type: string
                sprint_id:
                  type: string
                  nullable: true
                due_date:
                  type: string
                  format: date-time
                  nullable: true
                estimate:
                  type: number
                  nullable: true
      responses:
        "200":
          description: Updated issue
    delete:
      tags: [Issues]
      summary: Soft-delete an issue
      description: Requires `issue:delete` permission.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Comments ─────────────────────────────────────────────────────────────

  /admin/issues/{id}/comments:
    get:
      tags: [Comments]
      summary: List comments on an issue
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
    post:
      tags: [Comments]
      summary: Post a comment on an issue
      description: |
        The `body` field accepts HTML. To @mention a user, include a span:
        `<span data-type="mention" data-id="user_id" data-label="Alice">@Alice</span>`

        Pass `metadata.mentioned_user_ids` to trigger mention email notifications.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  description: HTML string
                metadata:
                  type: object
                  properties:
                    mentioned_user_ids:
                      type: array
                      items:
                        type: string
            example:
              body: "<p>Looks good! <span data-type=\"mention\" data-id=\"user_abc\">@Alice</span> can you review?</p>"
              metadata:
                mentioned_user_ids: [user_abc]
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    $ref: "#/components/schemas/Comment"

  # ─── Sprints ──────────────────────────────────────────────────────────────

  /admin/sprints:
    get:
      tags: [Sprints]
      summary: List sprints
      parameters:
        - in: query
          name: project_id
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [planned, active, completed]
      responses:
        "200":
          description: List of sprints
          content:
            application/json:
              schema:
                type: object
                properties:
                  sprints:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sprint"
                  count:
                    type: integer
    post:
      tags: [Sprints]
      summary: Create a sprint
      description: Requires `sprint:create` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, project_id]
              properties:
                name:
                  type: string
                project_id:
                  type: string
                goal:
                  type: string
                start_date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
            example:
              name: Sprint 3
              project_id: proj_abc
              start_date: "2026-03-10T00:00:00Z"
              end_date: "2026-03-24T00:00:00Z"
      responses:
        "201":
          description: Sprint created

  /admin/sprints/{id}:
    get:
      tags: [Sprints]
      summary: Get a sprint by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sprint object
    put:
      tags: [Sprints]
      summary: Update a sprint
      description: |
        Also used to start (`status: active`) or complete (`status: completed`) a sprint.
        Completing a sprint runs the `completeSprintWorkflow`, which moves unfinished issues to the next sprint.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                goal:
                  type: string
                status:
                  type: string
                  enum: [planned, active, completed]
                start_date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Updated sprint
    delete:
      tags: [Sprints]
      summary: Delete a sprint
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

