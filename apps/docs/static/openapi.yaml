  # ─── Org Calendar ─────────────────────────────────────────────────────────

  /admin/org/calendar:
    get:
      tags: [Org Calendar]
      summary: Get the organisation's working calendar
      responses:
        "200":
          description: Calendar settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  calendar:
                    $ref: "#/components/schemas/OrgCalendar"
    put:
      tags: [Org Calendar]
      summary: Update the organisation's working calendar
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                work_days:
                  type: array
                  items:
                    type: integer
                  description: 0=Sunday … 6=Saturday. Default is Mon–Fri [1,2,3,4,5].
                timezone:
                  type: string
            example:
              work_days: [1, 2, 3, 4, 5]
              timezone: America/New_York
      responses:
        "200":
          description: Updated calendar

  /admin/org/holidays:
    get:
      tags: [Org Calendar]
      summary: List organisation holidays
      responses:
        "200":
          description: Holidays list
          content:
            application/json:
              schema:
                type: object
                properties:
                  holidays:
                    type: array
                    items:
                      $ref: "#/components/schemas/OrgHoliday"
    post:
      tags: [Org Calendar]
      summary: Add a holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, date]
              properties:
                name:
                  type: string
                date:
                  type: string
                  format: date
                recurring:
                  type: boolean
                  default: false
                  description: If true, repeats every year on the same date
            example:
              name: New Year's Day
              date: "2026-01-01"
              recurring: true
      responses:
        "201":
          description: Holiday added

  /admin/org/holidays/{holidayId}:
    put:
      tags: [Org Calendar]
      summary: Update a holiday
      parameters:
        - in: path
          name: holidayId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                date:
                  type: string
                  format: date
                recurring:
                  type: boolean
      responses:
        "200":
          description: Updated holiday
    delete:
      tags: [Org Calendar]
      summary: Delete a holiday
      parameters:
        - in: path
          name: holidayId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Public share ─────────────────────────────────────────────────────────

  /public/share/{token}:
