            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        "201":
          description: Member added

  /admin/workspaces/{id}/teams/{teamId}/members/{userId}:
    delete:
      tags: [Teams]
      summary: Remove a user from a team
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: teamId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  # ─── Projects ─────────────────────────────────────────────────────────────

  /admin/projects:
    get:
      tags: [Projects]
      summary: List projects
      description: |
        Admins see all projects. Members see only projects where they have explicit access (via ProjectMember or ProjectTeam).
      parameters:
        - in: query
          name: workspace_id
          schema:
            type: string
          description: Filter by workspace
        - in: query
          name: status
          schema:
            type: string
            enum: [active, archived]
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                  count:
                    type: integer
    post:
      tags: [Projects]
      summary: Create a project
      description: Requires `project:create` permission. The creator is automatically added as a `manager` project member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, workspace_id]
              properties:
                name:
                  type: string
                workspace_id:
                  type: string
                identifier:
                  type: string
                  description: Uppercase short code (auto-generated if omitted)
                description:
                  type: string
                visibility:
                  type: string
                  enum: [private, public]
                  default: private
                color:
                  type: string
                icon:
                  type: string
                initial_statuses:
                  type: array
                  description: Override the default 6 Kanban statuses
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                      color:
                        type: string
                      category:
                        type: string
                        enum: [backlog, unstarted, started, completed, cancelled]
            example:
              name: Website Redesign
              workspace_id: ws_abc123
              identifier: SITE
              visibility: private
              color: "#6366f1"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"

  /admin/projects/{id}:
    get:
      tags: [Projects]
      summary: Get a project by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project object
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
        "403":
          description: No access to this project
        "404":
          description: Not found
    put:
      tags: [Projects]
      summary: Update a project
      description: Requires `project:update` permission.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [active, archived]
                visibility:
                  type: string
                  enum: [private, public]
                color:
                  type: string
                icon:
                  type: string
      responses:
        "200":
          description: Updated project
    delete:
      tags: [Projects]
      summary: Soft-delete a project
      description: Requires `project:delete` permission.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── Project Members ──────────────────────────────────────────────────────

  /admin/projects/{id}/access:
    get:
      tags: [Project Members]
      summary: Get enriched access list (members + teams)
      parameters:
        - in: path
